<div class="events-page">

  <h2 class="events-title">Eventos</h2>

  <div class="events-toolbar">

    <div class="league-select-wrapper">
      <select class="league-select" [(ngModel)]="selectedLeague">

        <option value="soccer_fifa_world_cup">
          🏆 FIFA World Cup
        </option>

      </select>

      <span class="league-arrow">⌄</span>
    </div>

    <div class="search-box">
      <span class="search-icon">🔍</span>

      <input type="text" placeholder="Buscar partido..." [(ngModel)]="searchTerm">
    </div>

  </div>

  <div class="event-card" *ngFor="let event of filteredEvents">

    <div class="event-meta">
      <div class="meta-line">
        <span class="meta-icon">🏆</span>
        <span>FIFA World Cup</span>
      </div>

      <div class="meta-line">
        <span class="meta-icon">📅</span>
        <span>{{ event.commenceTime | date:'dd MMM yyyy' }}</span>
      </div>

      <div class="meta-line">
        <span class="meta-icon">🕒</span>
        <span>{{ event.commenceTime | date:'HH:mm' }}</span>
      </div>
    </div>

    <div class="event-divider"></div>

    <div class="event-match">

      <div class="team">
        <span class="team-flag">
          {{ getTeamFlag(event.homeTeam) }}
        </span>
        <span class="team-name">
          {{ event.homeTeam }}
        </span>
      </div>

      <div class="vs-text">vs</div>

      <div class="team">
        <span class="team-flag">
          {{ getTeamFlag(event.awayTeam) }}
        </span>
        <span class="team-name">
          {{ event.awayTeam }}
        </span>
      </div>

    </div>

    <div class="event-actions">

  <button
    class="btn btn-outline-info"
    (click)="viewEvent(event)">
    Ver detalle
  </button>

  <button
    class="bet-button"
    (click)="goToBet(event)">
    Apostar
  </button>

</div>

  </div>

  <div class="empty-events" *ngIf="filteredEvents.length === 0">
    No se encontraron partidos.
  </div>

</div>
