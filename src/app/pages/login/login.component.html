<div class="container mt-5">

  <div class="row justify-content-center">

    <div class="col-md-4">

      <div class="card">

        <div class="card-body">

          <h3 class="mb-3 text-center">
            BetLkp
          </h3>

          <div class="mb-3">
            <label>Usuario</label>

            <input
              class="form-control"
              [(ngModel)]="username">
          </div>

          <div class="mb-3">
            <label>Contraseña</label>

            <input
              type="password"
              class="form-control"
              [(ngModel)]="password">
          </div>

          <button
            class="btn btn-primary w-100"
            (click)="login()">

            Iniciar sesión

          </button>

          <div
            *ngIf="error"
            class="alert alert-danger mt-3">

            {{ error }}

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
